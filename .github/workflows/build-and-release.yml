name: Build and Release

on:
  push:
    branches:
      - "**"

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run download.js
        run: node ./other/download.js

      - name: Collect generated files
        run: |
          mkdir artifacts
          # tu dodaj wszystkie ścieżki gdzie download.js generuje pliki
          cp -r ./output/* ./artifacts/ 2>/dev/null || true
          cp -r ./other/output/* ./artifacts/ 2>/dev/null || true
          cp -r ./dist/* ./artifacts/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: ${{ github.event.head_commit.message }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
