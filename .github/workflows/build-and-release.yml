name: Build and Release

on:
  push:
    branches:
      - "**"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run download.js
        run: node ./other/download.js

      - name: Prepare artifacts
        run: |
          mkdir artifacts

          # repo (bez .git)
          rsync -av --exclude='.git' ./ ./artifacts/repo/

          # wygenerowane pliki
          mkdir -p artifacts/generated
          cp -r ./output/* artifacts/generated/ 2>/dev/null || true
          cp -r ./other/output/* artifacts/generated/ 2>/dev/null || true
          cp -r ./dist/* artifacts/generated/ 2>/dev/null || true

      - name: Create ZIP
        run: |
          cd artifacts
          zip -r ../release.zip .

      - name: Create tag name
        id: tag
        run: echo "tag=build-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ github.event.head_commit.message }}
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
